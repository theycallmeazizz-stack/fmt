<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>No Internet</title>
<style>
  html,body{height:100%;margin:0}
  body{display:flex;align-items:center;justify-content:center;
       font-family:-apple-system,Roboto,Arial,sans-serif;
       background:#f4f6f8;color:#222;text-align:center;padding:24px}
  .box{max-width:340px}
  .icon{font-size:64px;margin-bottom:12px}
  h1{font-size:20px;margin:0 0 8px}
  p{color:#666;font-size:15px;line-height:1.5;margin:0 0 20px}
  button{background:#1565C0;color:#fff;border:0;border-radius:8px;
         padding:12px 28px;font-size:16px;font-weight:600}
</style>
</head>
<body>
  <div class="box">
    <div class="icon">📡</div>
    <h1>Internet connection nahi hai</h1>
    <p>Kripya apna Wi-Fi ya mobile data check karke dobara try karein.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
